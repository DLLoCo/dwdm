# ============================================================
# NYC Taxi — ST-SSL data + sin/cos TimeEmbed + FlowGate (v5)
# ============================================================
# Based on nyctaxi.yaml, enables time_embed and flow_gate

data:
  dataset: NYCTaxi
  data_dir: data/processed/NYCTaxi
  od_path: data/processed/NYCTaxi_OD/od_hourly.npz
  num_nodes: 200
  input_dim: 2
  output_dim: 2
  grid_rows: 10
  grid_cols: 20

model:
  hidden_dim: 64
  num_layers: 3
  cheb_k: 3
  embed_dim: 50
  kernel_size: 3
  use_flow_gate: true        # ← 开启
  use_time_embed: true      # ← 开启
  dropout: 0.1

train:
  epochs: 30
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  early_stop_patience: 15
  cl_decay_steps: 2000
  max_grad_norm: 5.0
  seed: 42
  save_dir: checkpoints/
  log_every: 10
